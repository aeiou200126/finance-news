<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日金融市場資訊聚合</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .loading { text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 每日金融市場資訊聚合</h1>
        
        <div id="ai-summary-box" class="box">
            <h2>🤖 AI 財經早報</h2>
            <div class="loading">正在分析今日市場數據，請稍候...</div>
        </div>

        <div id="news-box" class="box">
            <h2>📰 今日財經焦點</h2>
            <div class="loading">正在抓取新聞...</div>
        </div>

        <div id="market-box" class="box">
            <h2>📊 市場行情</h2>
            <div class="loading">正在讀取報價...</div>
        </div>
    </div>

    <script>
        // 設定路徑為 ./ 開頭，確保在 GitHub Pages 也能抓到檔案
        function loadData(url, elementId) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("檔案不存在");
                    return response.json();
                })
                .then(data => {
                    const container = document.getElementById(elementId);
                    if (elementId === 'ai-summary-box') {
                        container.innerHTML = `<h2>🤖 AI 財經早報</h2><div>${data.summary_html}</div>`;
                    } else if (elementId === 'news-box') {
                        let html = '<h2>📰 今日財經焦點</h2><ul>';
                        Object.values(data.sources).forEach(src => {
                            src.news.forEach(n => {
                                html += `<li><a href="${n.link}" target="_blank">${n.title}</a></li>`;
                            });
                        });
                        container.innerHTML = html + '</ul>';
                    } else if (elementId === 'market-box') {
                        container.innerHTML = `<h2>📊 市場行情</h2><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    }
                })
                .catch(error => {
                    console.error("載入失敗:", error);
                    document.getElementById(elementId).innerHTML = `<h2>錯誤</h2><p>無法載入 ${url}，請稍後再試。</p>`;
                });
        }

        // 啟動讀取
        loadData('./ai_summary.json', 'ai-summary-box');
        loadData('./news_data.json', 'news-box');
        loadData('./market_data.json', 'market-box');
    </script>
</body>
</html>
